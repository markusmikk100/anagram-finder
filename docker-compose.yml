version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - 8000:8000
    environment:
      - APP_ENV=local
      - APP_KEY=base64:BuCx8UFE8etQrqFlQt+1JbosMrl33S3vPyfnCp5SVh4=
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=anagram-db
      - DB_USERNAME=root
      - DB_PASSWORD=mysql
      - L5_SWAGGER_CONST_HOST=http://localhost:8000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - 3000:80

  db:
    image: mysql:latest
    environment:
      - MYSQL_DATABASE=anagram-db
      - MYSQL_ROOT_PASSWORD=mysql
    ports:
      - 3307:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      retries: 5